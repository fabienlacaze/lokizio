<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lokizio — Reset cache</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f0f1a;
  color: #f0f0f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
}
h1 { color: #e94560; margin-bottom: 12px; }
.box {
  background: #1a1a2e;
  border: 1px solid #2a2a3e;
  border-radius: 12px;
  padding: 30px 24px;
  max-width: 480px;
  width: 100%;
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #2a2a3e;
  border-top-color: #e94560;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 16px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.log {
  text-align: left;
  font-family: monospace;
  font-size: 12px;
  background: #0a0a14;
  padding: 12px;
  border-radius: 8px;
  margin-top: 12px;
  max-height: 200px;
  overflow-y: auto;
  color: #94a3b8;
}
.ok { color: #34d399; }
.err { color: #f87171; }
a {
  color: #e94560;
  text-decoration: none;
  display: inline-block;
  margin-top: 16px;
  padding: 10px 20px;
  border: 1px solid #e94560;
  border-radius: 8px;
}
</style>
</head>
<body>
<div class="box">
  <h1>🧹 Reset Lokizio</h1>
  <p>Nettoyage du cache et du Service Worker pour récupérer la dernière version.</p>
  <div class="spinner" id="spinner"></div>
  <div class="log" id="log"></div>
  <a href="./" id="goBtn" style="display:none">→ Retour à l'app</a>
</div>
<script>
const log = document.getElementById('log');
const spinner = document.getElementById('spinner');
const goBtn = document.getElementById('goBtn');

function add(msg, cls) {
  const div = document.createElement('div');
  div.className = cls || '';
  div.textContent = msg;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

(async () => {
  try {
    add('Recherche des Service Workers...');
    const regs = await navigator.serviceWorker.getRegistrations();
    add(`${regs.length} service worker(s) trouvé(s)`);
    for (const reg of regs) {
      const ok = await reg.unregister();
      add(`Unregister ${reg.scope}: ${ok ? 'OK' : 'KO'}`, ok ? 'ok' : 'err');
    }

    add('Suppression des caches...');
    const keys = await caches.keys();
    add(`${keys.length} cache(s) trouvé(s)`);
    for (const k of keys) {
      await caches.delete(k);
      add(`Cache "${k}" supprimé`, 'ok');
    }

    add('Nettoyage localStorage (clés non auth)...');
    const skipKeys = ['sb-mrvejwyvhuivmipfwlzz-auth-token']; // Garde la session
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const k = localStorage.key(i);
      if (k && !skipKeys.some(s => k.startsWith(s))) {
        localStorage.removeItem(k);
      }
    }
    add('localStorage nettoyé (session conservée)', 'ok');

    add('✓ Terminé. Tu peux retourner à l\'app.', 'ok');
    spinner.style.display = 'none';
    goBtn.style.display = 'inline-block';

    // Auto-redirect after 2s
    setTimeout(() => { location.href = './'; }, 2000);
  } catch (e) {
    add('Erreur: ' + e.message, 'err');
    spinner.style.display = 'none';
    goBtn.style.display = 'inline-block';
  }
})();
</script>
</body>
</html>
