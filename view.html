<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<title>Planning - Lokizio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0f0f1a; --surface:#1a1a2e; --surface2:#16213e; --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1); --accent:#e94560; --text:#f0f0f5; --text2:#9ca3af; --text3:#6b7280; --success:#34d399; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; font-size:14px; background:var(--bg); color:var(--text); min-height:100vh; padding:20px; }
  .container { max-width:700px; margin:0 auto; }
  .header { background:linear-gradient(135deg,#1a1a2e,#0f3460); padding:20px 24px; border-radius:16px; margin-bottom:20px; text-align:center; }
  .header h1 { color:#fff; font-size:20px; margin-bottom:4px; }
  .header .sub { color:rgba(255,255,255,0.5); font-size:12px; }
  .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; color:#fff; }
  .badge.airbnb { background:#e94560; }
  .badge.booking { background:#003580; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
  .card .date { font-weight:700; font-size:15px; color:var(--accent); min-width:120px; }
  .card .day { color:var(--text2); font-size:12px; }
  .card .details { font-size:13px; color:var(--text2); }
  .card .provider { background:var(--surface2); padding:4px 12px; border-radius:8px; font-size:12px; font-weight:600; color:var(--success); }
  .empty { text-align:center; color:var(--text3); padding:40px; }
  .loading { text-align:center; color:var(--text3); padding:40px; }
  .error { text-align:center; color:var(--accent); padding:40px; }
  .info { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:16px; text-align:center; color:var(--text2); font-size:13px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Lokizio</h1>
    <div class="sub" id="subtitle">Chargement...</div>
  </div>
  <div id="pushBanner" style="display:none;background:linear-gradient(135deg,#6c63ff,#5a54e0);padding:14px 18px;border-radius:12px;margin-bottom:16px;align-items:center;justify-content:space-between;gap:10px;">
    <div style="color:#fff;font-size:13px;">&#128276; Activez les notifications pour etre prevenu de vos prochains menages</div>
    <button onclick="subscribePush()" style="background:#fff;color:#6c63ff;border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;">Activer</button>
  </div>
  <div id="content"><div class="loading">Chargement du planning...</div></div>
</div>
<script>
const VAPID_PUBLIC_KEY = 'BMAMPjPS9Hb4yfjMpaku-69Cuwlot-lrBl53uF1JDF3OMzuEUckskFCS77Y534VT2PSf0S68ZSOJjfjXUqVU8-Q';
const SUPABASE_URL_VIEW = 'https://mrvejwyvhuivmipfwlzz.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ydmVqd3l2aHVpdm1pcGZ3bHp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjU0NTksImV4cCI6MjA4OTg0MTQ1OX0.1pi-KN5N6sNG6hIu6N0wDsR_g_G1TTf-uPecmWQ2ovU';

const params = new URLSearchParams(window.location.search);
const readonlyToken = params.get('readonly');
const providerToken = params.get('provider');

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function isValidPhotoUrl(url) {
  if (!url) return false;
  return url.startsWith('data:image/') || (url.startsWith('https://') && /\.(jpg|jpeg|png|gif|webp)(\?|$)/i.test(url));
}

let validations = {};
let matchedPropertyId = null;

// Push notification setup
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

function _viewToast(msg, kind) {
  let el = document.getElementById('viewToast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'viewToast';
    el.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:10px;color:#fff;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.4);max-width:90%;text-align:center;';
    document.body.appendChild(el);
  }
  el.style.background = kind === 'error' ? '#ef4444' : (kind === 'warn' ? '#f59e0b' : '#34d399');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(() => { el.style.display = 'none'; }, 4000);
}

async function subscribePush() {
  const token = providerToken || readonlyToken;
  if (!token) return;
  try {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      _viewToast('Notifications non supportees par ce navigateur', 'warn');
      return;
    }
    const reg = await navigator.serviceWorker.register('sw.js');
    await navigator.serviceWorker.ready;
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { _viewToast('Permission refusee', 'warn'); return; }
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    const subJson = sub.toJSON();
    await fetch(`${SUPABASE_URL_VIEW}/rest/v1/push_subscriptions`, {
      method: 'POST',
      headers: { 'apikey': ANON_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ provider_token: token, endpoint: subJson.endpoint, p256dh: subJson.keys.p256dh, auth: subJson.keys.auth })
    });
    document.getElementById('pushBanner').innerHTML = '<div style="color:#fff;font-size:13px;text-align:center;width:100%;">&#9989; Notifications activees !</div>';
    setTimeout(() => { document.getElementById('pushBanner').style.display = 'none'; }, 5000);
  } catch (e) {
    console.error('Push subscribe error:', e);
    _viewToast('Erreur lors de l\'activation des notifications', 'error');
  }
}

function showPushBanner() {
  if (!('PushManager' in window)) return;
  if (Notification.permission !== 'default') { document.getElementById('pushBanner').style.display = 'none'; return; }
  document.getElementById('pushBanner').style.display = 'flex';
}

async function loadValidations(propId) {
  try {
    const resp = await fetch(`${SUPABASE_URL_VIEW}/rest/v1/cleaning_validations?property_id=eq.${encodeURIComponent(propId)}&select=*`, {
      headers: { 'apikey': ANON_KEY }
    });
    const data = await resp.json();
    if (Array.isArray(data)) {
      data.forEach(v => { validations[v.cleaning_date + '_' + v.provider_name] = v; });
    }
  } catch (e) { console.error('loadValidations:', e); }
}

async function validateCleaning(date, provider, status) {
  if (!matchedPropertyId) return;
  try {
    const resp = await fetch(`${SUPABASE_URL_VIEW}/rest/v1/cleaning_validations`, {
      method: 'POST',
      headers: { 'apikey': ANON_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify({
        property_id: matchedPropertyId,
        cleaning_date: date,
        provider_name: provider,
        status: status,
        validated_at: new Date().toISOString(),
      }),
    });
    const data = await resp.json();
    if (data && !data.error) {
      validations[date + '_' + provider] = data[0] || data;
      loadData();
    }
  } catch (e) { console.error('validateCleaning:', e); }
}

async function uploadPhotos(input, date, provider) {
  const files = input.files;
  if (!files.length) return;
  const photos = [];
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    if (file.size > 5 * 1024 * 1024) continue; // Max 5MB
    const reader = new FileReader();
    const b64 = await new Promise(resolve => { reader.onload = e => resolve(e.target.result); reader.readAsDataURL(file); });
    photos.push(b64);
  }
  const key = date + '_' + provider;
  const existing = validations[key];
  if (existing && existing.id) {
    await fetch(`${SUPABASE_URL_VIEW}/rest/v1/cleaning_validations?id=eq.${encodeURIComponent(existing.id)}`, {
      method: 'PATCH',
      headers: { 'apikey': ANON_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ photos: [...(existing.photos||[]), ...photos] }),
    });
  }
  loadData();
}

async function loadData() {
  const content = document.getElementById('content');
  const subtitle = document.getElementById('subtitle');

  if (!readonlyToken && !providerToken) {
    content.innerHTML = '<div class="error">Lien invalide. Aucun token fourni.</div>';
    subtitle.textContent = 'Erreur';
    return;
  }

  try {
    let found = null;
    let providerName = null;
    let matchedProp = null;
    let matchedPlanning = [];

    // SECURE: Query by token directly — only returns matching property
    if (readonlyToken) {
      const resp = await fetch(`${SUPABASE_URL_VIEW}/rest/v1/properties?readonly_token=eq.${encodeURIComponent(readonlyToken)}&select=id,name,providers,checklist,plannings(cleanings,transmitted)`, {
        headers: { 'apikey': ANON_KEY }
      });
      const props = await resp.json();
      if (Array.isArray(props) && props.length > 0) {
        const p = props[0];
        found = true;
        matchedProp = { id: p.id, name: p.name, providers: p.providers || [], checklist: p.checklist || [] };
        matchedPlanning = (p.plannings && p.plannings[0]) ? (p.plannings[0].cleanings || []) : [];
      }
    }

    if (providerToken && !found) {
      // SECURE: Use Edge Function to find property by provider token server-side
      // Fallback: query properties that contain this token via RPC or filter
      // For now, query with providers filter containing the token
      const resp = await fetch(`${SUPABASE_URL_VIEW}/rest/v1/properties?providers=cs.[{"token":"${encodeURIComponent(providerToken)}"}]&select=id,name,providers,checklist,plannings(cleanings)`, {
        headers: { 'apikey': ANON_KEY }
      });
      const props = await resp.json();
      if (Array.isArray(props) && props.length > 0) {
        const p = props[0];
        const prov = (p.providers || []).find(pr => pr.token === providerToken);
        if (prov) {
          found = true;
          matchedProp = { id: p.id, name: p.name, providers: p.providers || [], checklist: p.checklist || [] };
          providerName = prov.name;
          matchedPlanning = (p.plannings && p.plannings[0]) ? (p.plannings[0].cleanings || []) : [];
        }
      }
    }

    if (!found) {
      content.innerHTML = '<div class="error">Planning introuvable. Le lien est peut-etre expire.</div>';
      subtitle.textContent = 'Non trouve';
      return;
    }

    const property = (matchedProp && matchedProp.name) || 'Planning';
    if (matchedProp && matchedProp.id) { matchedPropertyId = matchedProp.id; await loadValidations(matchedProp.id); }

    let displayCleanings = matchedPlanning;
    if (providerName) {
      displayCleanings = matchedPlanning.filter(c => c.provider === providerName);
      subtitle.textContent = 'Planning de ' + esc(providerName) + ' - ' + esc(property);
      document.title = 'Planning ' + providerName + ' - Lokizio';
    } else {
      subtitle.textContent = 'Planning complet - ' + esc(property);
      document.title = 'Planning ' + property + ' - Lokizio';
    }

    displayCleanings.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    const today = new Date().toISOString().split('T')[0];
    displayCleanings = displayCleanings.filter(c => (c.date || '') >= today);

    if (!displayCleanings.length) {
      content.innerHTML = '<div class="empty">Aucun menage a venir.</div>';
      return;
    }

    const checklist = (matchedProp && matchedProp.checklist) || [];
    let html = '<div class="info">' + displayCleanings.length + ' menage(s) a venir</div>';

    for (const c of displayCleanings) {
      const source = (c.source || '').toLowerCase();
      const badgeClass = source.includes('airbnb') ? 'airbnb' : source.includes('booking') ? 'booking' : '';
      const isProvider = !!providerToken;
      const isToday = (c.cleaningDate || c.date) === today;
      const isPast = (c.cleaningDate || c.date) < today;
      const cleaningId = (c.cleaningDate || c.date) + '_' + (c.provider || '');
      const validation = validations[cleaningId];
      const statusIcon = validation ? (validation.status === 'done' ? '&#9989;' : validation.status === 'in_progress' ? '&#9203;' : '&#9898;') : '&#9898;';
      const statusText = validation ? (validation.status === 'done' ? 'Termine' : validation.status === 'in_progress' ? 'En cours' : 'A faire') : 'A faire';
      const statusColor = validation && validation.status === 'done' ? '#34d399' : validation && validation.status === 'in_progress' ? '#f59e0b' : 'var(--text3)';
      const escDate = esc(c.cleaningDate || c.date || '');
      const escProv = esc(c.provider || '');

      html += '<div class="card" style="flex-direction:column;align-items:stretch;' + (isToday ? 'border-left:3px solid #e94560;' : '') + '">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;">';
      html += '<div>';
      html += '<div class="date">' + esc(c.dayName || '') + ' ' + fmtDate(c.date) + '</div>';
      html += '<div class="details"><span class="badge ' + badgeClass + '">' + esc(c.source || '') + '</span> Arrivee: ' + fmtDate(c.date) + ' &rarr; Depart: ' + fmtDate(c.checkoutDate) + '</div>';
      html += '</div>';
      html += '<div style="text-align:right;">';
      html += '<div class="provider">' + escProv + '</div>';
      html += '<div style="font-size:11px;color:' + statusColor + ';margin-top:4px;">' + statusIcon + ' ' + statusText + '</div>';
      html += '</div></div>';

      if (isProvider && !isPast && (!validation || validation.status !== 'done')) {
        html += '<div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">';
        html += '<button onclick="validateCleaning(\'' + escDate + '\',\'' + escProv + '\',\'in_progress\')" style="flex:1;padding:10px;background:#f59e0b;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">&#128692; En route</button>';
        html += '<button onclick="validateCleaning(\'' + escDate + '\',\'' + escProv + '\',\'done\')" style="flex:1;padding:10px;background:#34d399;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">&#9989; Termine</button>';
        html += '</div>';
        html += '<div style="margin-top:8px;"><input type="file" accept="image/*" multiple style="font-size:11px;color:var(--text3);" onchange="uploadPhotos(this,\'' + escDate + '\',\'' + escProv + '\')"></div>';
      }

      // Photos — validated URLs only
      if (validation && validation.photos && validation.photos.length) {
        html += '<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">';
        validation.photos.forEach(function(p) {
          if (isValidPhotoUrl(p)) {
            html += '<img src="' + esc(p) + '" style="width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--border);">';
          }
        });
        html += '</div>';
      }

      // Checklist
      if (isProvider && checklist.length > 0 && isToday) {
        const safeCleaningId = cleaningId.replace(/[^a-zA-Z0-9]/g, '_');
        html += '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">';
        html += '<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:6px;">Checklist</div>';
        checklist.forEach(function(item, ci) {
          const checkKey = safeCleaningId + '_check_' + ci;
          const checked = localStorage.getItem(checkKey) === '1';
          const itemText = esc(typeof item === 'string' ? item : (item.text || item.name || ''));
          html += '<label style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;font-size:13px;color:' + (checked ? 'var(--success)' : 'var(--text)') + ';">';
          html += '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="localStorage.setItem(\'' + checkKey + '\',this.checked?\'1\':\'0\');this.parentElement.style.color=this.checked?\'var(--success)\':\'var(--text)\';" style="width:18px;height:18px;accent-color:var(--success);">';
          html += '<span style="' + (checked ? 'text-decoration:line-through;opacity:0.6;' : '') + '">' + itemText + '</span>';
          html += '</label>';
        });
        html += '</div>';
      }

      html += '</div>'; // card
    }
    content.innerHTML = html;

  } catch (e) {
    console.error('loadData error:', e);
    content.innerHTML = '<div class="error">Erreur de chargement. Veuillez reessayer.</div>';
    subtitle.textContent = 'Erreur';
  }
}

loadData();
showPushBanner();
</script>
</body>
</html>
